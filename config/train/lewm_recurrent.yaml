defaults:
  - _self_
  - launcher: local
  - data: pusht
  - model: lewm_recurrent

output_model_name: lewm_recurrent
subdir: ${hydra:job.id}

num_workers: 6
train_split: 0.9
seed: 3072
img_size: 224
embed_dim: 192
history_size: 3

trainer:
  max_epochs: 100
  devices: auto
  accelerator: gpu
  precision: bf16
  gradient_clip_val: 1.0

loader:
  batch_size: 128
  num_workers: ${num_workers}
  persistent_workers: True
  prefetch_factor: 3
  pin_memory: True

optimizer:
  type: AdamW
  lr: 5e-5
  weight_decay: 1e-3

num_preds: 1

loss:
  sigreg:
    weight: 0.09
    kwargs:
      knots: 17
      num_proj: 1024

recurrent:
  enabled: true
  max_depth: 8
  inter_loss_weight: 0.5
  consistency_weight: 0.0
  halt_loss_weight: 0.1
  halt_label_mode: improvement
  halt_min_improvement: 0.0
  halt_min_relative_improvement: 0.0
  halt_error_threshold: null
  halt_residual_threshold: null
  halt_pos_weight: null
  final_no_stopgrad: true
  intermediate_stopgrad: true
  log_depth_stats: true
