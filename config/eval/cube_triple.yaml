defaults:
  - launcher: local
  - solver: cem
  - _self_

world:
  env_name: swm/OGBCube-v0
  num_envs: ${eval.num_eval}
  max_episode_steps: ???
  env_type: triple
  ob_type: states
  multiview: False
  width: 64
  height: 64
  visualize_info: False
  terminate_at_goal: True

dataset:
  stats: ${eval.dataset_name}
  keys_to_cache:
    - action

seed: 42
policy: random

plan_config:
  horizon: 5
  receding_horizon: 5
  action_block: 5

planner:
  predictor_depth: null
  halt_mode: none
  halt_eps: null
  halt_threshold: 0.5
  min_depth: 1
  return_depth_stats: false

eval:
  num_eval: 50
  goal_offset_steps: 25
  eval_budget: 50
  img_size: 224
  dataset_name: ogbench/visual_cube_triple_play
  callables:
    - method: set_state
      args:
        qpos:
          value: qpos
        qvel:
          value: qvel
    - method: set_target_pos
      args:
        cube_id:
          value: 0
          in_dataset: False
        target_pos:
          value: goal_privileged_block_0_pos
        target_quat:
          value: goal_privileged_block_0_quat
    - method: set_target_pos
      args:
        cube_id:
          value: 1
          in_dataset: False
        target_pos:
          value: goal_privileged_block_1_pos
        target_quat:
          value: goal_privileged_block_1_quat
    - method: set_target_pos
      args:
        cube_id:
          value: 2
          in_dataset: False
        target_pos:
          value: goal_privileged_block_2_pos
        target_quat:
          value: goal_privileged_block_2_quat

output:
  filename: ogb_cube_triple_results.txt
